<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Apertura</title>
<style>
  body {
  font-family: Arial, sans-serif;
  text-align: center;
  padding: 30px;
  
  /* sfondo verde tipo tavolo */
  background: radial-gradient(circle, #0b5d2a, #063d1a);
  color: white;
}
  button { margin: 5px; padding: 10px 15px; font-size: 16px; }
  #mano {
  background: white;
  color: black;
  display: inline-block;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
  margin: 20px;
}
  .riga-mano {
  font-family: monospace;
  font-size: 20px;
  text-align: left;
}

.mano {
  margin: 0 auto;
  font-size: 20px;
  border-collapse: collapse;
}

.mano td {
  padding: 4px 8px;
}

.seme {
  width: 30px;
  text-align: right;
  font-weight: bold;
}

.seme:contains("♥"),
.seme:contains("♦") {
  color: red;
} 

.carte {
  text-align: left;
  font-family: monospace;
}
.feedback-img {
  margin-top: 10px;
  width: 120px;
  border-radius: 10px;
  animation: fadeIn 0.5s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.8); }
  to { opacity: 1; transform: scale(1); }
}
</style>
</head>
<body>

<h1>Quiz Bridge</h1>

<div id="mano"></div>

<div>
  <div>
  <button onclick="risposta('1C')">1♣</button>
  <button onclick="risposta('1D')">1♦</button>
  <button onclick="risposta('1H')">1♥</button>
  <button onclick="risposta('1S')">1♠</button>
  <button onclick="risposta('1NT')">1NT</button>
  </div>
  <div>
  <button onclick="risposta('2C')">2♣</button>
  <button onclick="risposta('2D')">2♦</button>
  <button onclick="risposta('2H')">2♥</button>
  <button onclick="risposta('2S')">2♠</button>
  <button onclick="risposta('2NT')">2NT</button>
  </div>
</div>

<p id="risultato"></p>

<button onclick="nuovaMano()">Nuova mano</button>

<script>
// carte e valori
const semi = ["♠", "♥", "♦", "♣"];
const valori = [
  {c:"A", p:4}, {c:"K", p:3}, {c:"Q", p:2}, {c:"J", p:1},
  {c:"10", p:0}, {c:"9", p:0}, {c:"8", p:0},
  {c:"7", p:0}, {c:"6", p:0}, {c:"5", p:0},
  {c:"4", p:0}, {c:"3", p:0}, {c:"2", p:0}
];

let manoCorrente = [];
let rispostaCorretta = "";
const ordineValori = ["A","K","Q","J","10","9","8","7","6","5","4","3","2"];

// genera mano casuale con almeno 12 punti
function generaMano() {
  let mano, punti;

  do {
    let mazzo = [];

    semi.forEach(s => {
      valori.forEach(v => {
        mazzo.push({...v, seme: s});
      });
    });

    mazzo.sort(() => Math.random() - 0.5);
    mano = mazzo.slice(0,13);

    punti = mano.reduce((tot, carta) => tot + carta.p, 0);

  } while (punti < 12);

  return {mano, punti};
}

function calcolaDistribuzione(mano) {
  let distribuzione = { "♠":0, "♥":0, "♦":0, "♣":0 };

  mano.forEach(carta => {
    distribuzione[carta.seme]++;
  });

  // prendi solo i numeri e ordinali decrescenti
  let valori = Object.values(distribuzione);
  valori.sort((a, b) => b - a);

  return valori.join("-");
}

function contaSeme(mano, seme) {
  return mano.filter(c => c.seme === seme).length;
}

// controlla bilanciata (molto semplice)
function èBilanciata(mano) {
  let distribuzione = calcolaDistribuzione(mano);
  let ordDistribuzione = distribuzione.split("-").map(Number).sort((a, b) => b - a);
  let stringDistribuzione = JSON.stringify(ordDistribuzione);
  return stringDistribuzione === JSON.stringify([4,4,3,2]) || stringDistribuzione === JSON.stringify([4,3,3,3]) || stringDistribuzione === JSON.stringify([5,3,3,2]);
}

// decide apertura (logica base)
function calcolaRisposta(mano, punti) {
  let nspades = contaSeme(mano, "♠");
  let nhearts = contaSeme(mano, "♥");
  let ndiamonds = contaSeme(mano, "♦");
  let nclubs = contaSeme(mano, "♣");
  if (punti >= 15 && punti <= 17 && èBilanciata(mano)) {
    return "1NT";
  }
  if (punti >= 12 && punti <= 20) { 
    if (nspades == Math.max(nspades,nclubs,nhearts,ndiamonds) && nspades >4) {
      return "1S";
    }
    if (nhearts == Math.max(nclubs,nhearts,ndiamonds) && nhearts >4) {
      return "1H";
    }
    if (ndiamonds == Math.max(ndiamonds,nclubs) && ndiamonds >3) {
      return "1D";
    }
    return "1C";
  }
 if (punti >= 21 && punti <= 23 && èBilanciata(mano)) {
    return "1NT";
}
if (punti >= 24 && èBilanciata(mano)) {
    return "2C";
}
if (punti >= 21) { 
    if (nspades == Math.max(nspades,nclubs,nhearts,ndiamonds) && nspades >4) {
      return "2S";
    }
    if (nhearts == Math.max(nclubs,nhearts,ndiamonds) && nhearts >4) {
      return "2H";
    }
    if (ndiamonds == Math.max(ndiamonds.nclubs) && ndiamonds >3) {
      return "2D";
    }
    return "2C";
  }
}
// stampa mano
function mostraMano(mano, punti) {
  let html = "<table class='mano'>";

  semi.forEach(s => {
    let carte = mano
      .filter(c => c.seme === s)
      .sort((a, b) => ordineValori.indexOf(a.c) - ordineValori.indexOf(b.c))
      .map(c => c.c)
      .join(" ");

    html += `
      <tr>
        <td class="seme">${s}</td>
        <td class="carte">${carte}</td>
      </tr>
    `;
  });

  html += "</table>";

  // html += `<p>Punti: ${punti}</p>`;

  document.getElementById("mano").innerHTML = html;
}

// feedback casuale
const feedbackPositivi = ["Bravo! 🎉", "Corretto! 👍", "Ottimo! 😄",];
const feedbackNegativi = ["Sbagliato 😅", "Riprova! ❌", "Nope 😬"];
const gifPositive = [
  "gif/very_good.gif",
  "gif/very_good_2.gif",
  "gif/obama.gif",
  "gif/einstein.gif"
];

const gifNegative = [
  "gif/gif_pinguino.gif",
  "gif/no.gif",
  "gif/tom_jerry.gif",
  "gif/pappagallo_no.gif"
];

function risposta(scelta) {
  let corretto = scelta === rispostaCorretta;

  // probabilità: 0,1,2,3 → 1 su 4 = gif
  let usaGif = Math.floor(Math.random() * 2) === 0;

  let output = "";

  if (usaGif) {
    let gifArray = corretto ? gifPositive : gifNegative;
    let gif = gifArray[Math.floor(Math.random() * gifArray.length)];

    output = `<img src="${gif}" class="feedback-img">`;

  } else {
    let msgArray = corretto ? feedbackPositivi : feedbackNegativi;
    let msg = msgArray[Math.floor(Math.random() * msgArray.length)];

    output = `<div>${msg}</div>`;
  }

  document.getElementById("risultato").innerHTML = output;
}

// nuova mano
function nuovaMano() {
  let {mano, punti} = generaMano();

  manoCorrente = mano;
  rispostaCorretta = calcolaRisposta(mano, punti);

  mostraMano(mano, punti);
  document.getElementById("risultato").innerText = "";
}

// avvio
nuovaMano();
</script>

</body>
</html>
